name: Deploy DocC Documentation

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Run all JavaScript-based actions on Node.js 24. The bundled actions below still
# declare Node 20 in their action.yml; this opt-in (recommended by GitHub's own
# deprecation notice) moves them to Node 24 without waiting for new action majors,
# silencing the "Node.js 20 actions are deprecated" warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Allow one docs deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # Use the newest Xcode the runner has installed. Older toolchains' symbol-graph
      # extractor `fatalError`s on the SceneKit/CoreImage code in SwiftXStateGraph;
      # newer ones extract it cleanly. Dependency-free — just picks the latest Xcode_*.app.
      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            echo "Selecting $LATEST"
            sudo xcode-select -s "$LATEST"
          fi
          swift --version

      # Cache the SwiftPM build so swift-syntax (the macro plugin) isn't recompiled every run.
      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-docs-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-docs-

      # Build all targets into a single combined documentation archive. This merges every
      # module under one hosting base path with cross-module navigation and unified search,
      # and emits its own landing page at /documentation/. Verified locally at ~0.8 GB peak
      # RSS — well within the runner's memory — so the original "cleaned up orphan process"
      # failure was never about this flag; it was an older toolchain's symbol-graph extractor
      # crashing on SwiftXStateGraph, which the "Select newest Xcode" step above avoids.
      #
      # Note: combined docs is all-or-nothing (one merge invocation), so unlike the previous
      # per-target loop there is no graceful per-module degradation — if any target's symbol
      # extraction fails, the whole build fails. The newest-Xcode selection is the safeguard.
      - name: Build DocC (combined)
        run: |
          set -euo pipefail
          REPO="${{ github.event.repository.name }}"
          rm -rf docs && mkdir -p docs
          swift package --allow-writing-to-directory docs \
            generate-documentation \
            --enable-experimental-combined-documentation \
            --target SwiftXState \
            --target SwiftXStateGraph \
            --target SwiftXStateInspect \
            --target SwiftXStateInspectorUI \
            --target SwiftXStateInspectURLSession \
            --target SwiftXStateSwiftData \
            --target SwiftXStateSwiftUI \
            --output-path docs \
            --transform-for-static-hosting \
            --hosting-base-path "$REPO" \
            --disable-indexing

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
