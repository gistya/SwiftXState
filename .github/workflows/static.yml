name: Deploy DocC Documentation

on:
  push:
    branches: [ main ]        
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Combined Documentation
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target SwiftXState \
            --target SwiftXStateGraph \
            --target SwiftXStateInspect \
            --target SwiftXStateInspectorUI \
            --target SwiftXStateInspectURLSession \
            --target SwiftXStateSwiftData \
            --target SwiftXStateSwiftUI \
            --output-path ./docs \
            --transform-for-static-hosting \
            --hosting-base-path ${{ github.event.repository.name }} \
            --enable-experimental-combined-documentation \
            --disable-indexing

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4