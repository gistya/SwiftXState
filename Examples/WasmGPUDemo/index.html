<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SwiftXState on the GPU · WebAssembly · WebGPU</title>
  <style>
    body { margin: 0; background: #0f0f12; color: #ddd; font: 15px -apple-system, system-ui, sans-serif; text-align: center; }
    h1 { font-size: 1.2rem; margin: 1.5rem 0 .25rem; }
    p.sub { color: #888; margin: .25rem 0 1.25rem; }
    #stage { position: relative; display: inline-block; }
    canvas { border-radius: 10px; box-shadow: 0 8px 40px rgba(124,92,255,.35); max-width: 92vw; height: auto; display: block; touch-action: none; cursor: grab; }
    #status { color: #9a8cff; margin-top: 1rem; min-height: 1.2em; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <h1>A state-machine graph, rendered on the GPU — from Swift</h1>
  <p class="sub">SwiftXState → WebAssembly → WebGPU. Drag to rotate · tap a node to select.</p>
  <div id="stage">
    <canvas id="gpu" width="720" height="480"></canvas>
  </div>
  <div id="events"></div>
  <div id="status">Loading…</div>

  <!-- The only hand-written JavaScript: one line to start the WebAssembly module.
       Everything else — DOM, WebGPU, the render loop, input — is Swift via JavaScriptKit. -->
  <script type="module">import { init } from "./bundle.js"; init();</script>
</body>
</html>
